# WindowRules — translated from JaKooLit Hyprland-Dots configs/WindowRules.conf
# Hyprland tags, opacity, blur, animation, rounding, dimaround, layerrules
# are not available in Sway and are intentionally omitted.
# native Wayland apps use app_id=""; X11/XWayland apps use class="".

# ── Baseline rules (always present) ──────────────────────────────────────────
for_window [app_id="pavucontrol"] floating enable, move position center
for_window [app_id="org.pulseaudio.pavucontrol"] floating enable, move position center
for_window [app_id="com.saivert.pwvucontrol"] floating enable, move position center
for_window [app_id="blueman-manager"] floating enable, move position center
for_window [app_id="nm-connection-editor"] floating enable, move position center
for_window [app_id="qalculate-gtk"] floating enable, move position center
for_window [app_id="org.gnome.Calculator"] floating enable, move position center
for_window [app_id="org.kde.polkit-kde-authentication-agent-1"] floating enable, move position center
for_window [title="^(Picture-in-Picture)$"] floating enable, sticky enable, resize set 640 360, move position 72 ppt 7 ppt
for_window [app_id="mpv"] inhibit_idle fullscreen

# ── Browsers (X11/XWayland) ───────────────────────────────────────────────────
# (opacity rules omitted — Sway cannot set per-window opacity at the compositor level)
# firefox
for_window [class="firefox"] focus
for_window [class="org.mozilla.firefox"] focus
for_window [class="Firefox-esr"] focus
# chrome / chromium / brave / edge / thorium / cachy / zen — no special float needed

# ── Settings / system utilities ───────────────────────────────────────────────
for_window [app_id="nm-applet"] floating enable
for_window [class="nm-applet"] floating enable
for_window [app_id="gnome-disks"] floating enable, move position center
for_window [app_id="org.gnome.baobab"] floating enable, move position center
for_window [class="Baobab"] floating enable, move position center
for_window [class="baobab"] floating enable, move position center
for_window [app_id="file-roller"] floating enable, move position center
for_window [app_id="org.gnome.FileRoller"] floating enable, move position center
for_window [class="qt5ct"] floating enable, move position center
for_window [class="qt6ct"] floating enable, move position center
for_window [class="xdg-desktop-portal-gtk"] floating enable, move position center
for_window [app_id="wihotspot"] floating enable, move position center
for_window [app_id="wihotspot-gui"] floating enable, move position center
for_window [class="btrfs-assistant"] floating enable, move position center
for_window [class="timeshift-gtk"] floating enable, move position center
for_window [title="^(Kvantum Manager)$"] floating enable, move position center
for_window [title="^(ROG Control)$"] floating enable, move position center
for_window [app_id="nwg-displays"] floating enable, move position center
for_window [app_id="nwg-look"] floating enable, move position center

# ── KooL internal windows ─────────────────────────────────────────────────────
for_window [title="^(KooL Quick Cheat Sheet)$"] floating enable, move position center, resize set 65 ppt 90 ppt
for_window [title="^(KooL Hyprland Settings)$"] floating enable, move position center
for_window [title="^(Keybindings)$"] floating enable, move position center

# ── Viewers ───────────────────────────────────────────────────────────────────
for_window [app_id="gnome-system-monitor"] floating enable, move position center
for_window [app_id="org.gnome.SystemMonitor"] floating enable, move position center
for_window [app_id="io.missioncenter.MissionCenter"] floating enable, move position center
for_window [app_id="evince"] floating enable, move position center
for_window [app_id="eog"] floating enable, move position center
for_window [app_id="org.gnome.Loupe"] floating enable, move position center

# ── Wallpaper pickers ─────────────────────────────────────────────────────────
for_window [class="Waytrogen"] floating enable, move position center
for_window [class="waytrogen"] floating enable, move position center

# ── Multimedia ────────────────────────────────────────────────────────────────
for_window [app_id="mpv"] floating enable
for_window [app_id="com.github.rafostar.Clapper"] floating enable
for_window [class="vlc"] floating enable

# ── Messaging / IM ────────────────────────────────────────────────────────────
for_window [class="discord"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="WebCord"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="vesktop"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="Ferdium"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="ferdium"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [app_id="org.telegram.desktop"] floating enable, move position center
for_window [app_id="io.github.tdesktop_x64.TDesktop"] floating enable, move position center
for_window [class="teams-for-linux"] floating enable, move position center
for_window [class="im.riot.Riot"] floating enable, move position center
for_window [class="Element"] floating enable, move position center
for_window [class="Whatsapp-for-linux"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="whatsapp-for-linux"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="ZapZap"] floating enable, move position center, resize set 60 ppt 70 ppt
for_window [class="com.rtosta.zapzap"] floating enable, move position center, resize set 60 ppt 70 ppt

# ── File managers ─────────────────────────────────────────────────────────────
# Thunar copy/progress dialog
for_window [app_id="thunar" title="^(File Operation Progress)$"] floating enable, move position center

# ── Games / Steam ─────────────────────────────────────────────────────────────
# Steam popups (non-main window)
for_window [class="steam" title="^(?!Steam$).*"] floating enable
for_window [class="Steam" title="^(?!Steam$).*"] floating enable

# ── IDE popups ────────────────────────────────────────────────────────────────
# VSCodium/VSCode non-main windows
for_window [class="codium" title="^(?!.*codium|.*VSCodium).*"] floating enable
for_window [class="VSCodium" title="^(?!.*codium|.*VSCodium).*"] floating enable
# JetBrains — suppress initial focus steal
no_focus [class="jetbrains-.*"]
# Heroic popup windows
for_window [class="com.heroicgameslauncher.hgl" title="^(?!Heroic Games Launcher$).*"] floating enable

# ── Generic popup / dialog titles ─────────────────────────────────────────────
for_window [title="^(Authentication Required)$"] floating enable, move position center
for_window [title="^(Add Folder to Workspace)$"] floating enable, move position center
for_window [title="^(Save As)$"] floating enable, move position center
for_window [title="^(Open Files)$"] floating enable
for_window [title="^(SDDM Background)$"] floating enable, move position center
for_window [app_id="yad"] floating enable, move position center
for_window [class="yad"] floating enable, move position center
no_focus [title="^(wind.*)$"]

# ── Miscellaneous ─────────────────────────────────────────────────────────────
for_window [class="Zoom"] floating enable
for_window [class="zoom"] floating enable
for_window [class="onedriver"] floating enable
for_window [class="onedriver-launcher"] floating enable
for_window [app_id="audacious"] floating enable
